# Enable detailed logging for the first few runs to catch any issues
sonar.verbose=true

# YOUR specific SonarCloud Organization Key
sonar.organization=abhayverma007-1

# YOUR specific Project Key we found earlier
sonar.projectKey=AbhayVerma007_Project-6
sonar.projectName=Project-6

# Encoding and Language
sonar.language=java
sonar.sourceEncoding=UTF-8

# Narrow the focus to your source code (Avoids scanning the 'target' folder)
sonar.sources=src/main/java
sonar.java.binaries=target/classes

# This ensures your JaCoCo coverage reports show up on the dashboard
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
